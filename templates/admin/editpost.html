{% extends "base.html" %}
{% block title %} Admin editpost{% endblock %}
{% block body %}
  </head>
  <body>
  <div class="editpostcontainer">
    <a href="/admin" class="adminbutton">&#8592; Back to Dashboard</a>
    <header><h1>Add/Edit Posts</h1></header>
    <div class="editpost">
    <form method="POST" enctype="multipart/form-data"> 

    <label for="inputEmail3" class="col-sm-2 col-form-label">Title</label>
    <input type="text" class="form-control" id="inputEmail3" name="title" placeholder="enter post title" value="{{blog.title}}">
 
    <label for="inputPassword3" class="col-sm-2 col-form-label">Subtitle</label>
    <input type="text" class="form-control" id="inputEmail3" name="subtitle" placeholder="enter post subtitle" value="{{blog.subtitle}}">

    <label for="inputEmail3" class="col-sm-2 col-form-label">Location</label>
    <input type="text" class="form-control" id="inputEmail3" name="location" placeholder="enter post location" value="{{blog.location}}">

    <label for="inputEmail3" class="col-sm-2 col-form-label">Author</label>
    <p>{{current_user.username}}</p>

    <label for="inputEmail3" class="col-sm-2 col-form-label">Upload image</label>
    <input type="file" class="form-control" id="inputEmail3" name="image" placeholder="enter post image" value="{{blog.image}}">

    <label for="inputEmail3" class="col-sm-2 col-form-label">Content 1</label>
    <textarea type="text" class="form-control" id="inputEmail3" name="content1" placeholder="enter post content 1">{{blog.content1}}</textarea>

    <label for="inputEmail3" class="col-sm-2 col-form-label">Content 2</label>
    <textarea type="text" class="form-control" id="inputEmail3" name="content2" placeholder="enter post content 2">{{blog.content2}}</textarea>
  
    <button type="submit" class="admin-btn primary">Save</button>
</form>
</div> 
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  </body>
{% endblock %}
