{% extends "base.html" %}
{% block title %} 
Edit Reminder
{% endblock %}
{% block body %}
<head>
	<body style="background: #f5f5f5;">
		<a href="/reminder/{{pet_id}}/new" class="adminbutton">&#8592; Back to Reminders</a>
        <div class="editremindercontainer">
			<div class="contactbox">
			<header>
				<h1>Edit Reminder</h1>
			</header>
					<form method="POST">
						<label>Reminder Title</label>
						<input type="text" id="text" name="title" placeholder="e.g. Feed pet" value="{{reminder.title}}"><br>
						<div class="date">
							<label>Date</label>
							<input type="date" id="date" name="date" required value="{{reminder.date}}"><br>
						</div>
						<div class="time">
							<label for="time">Time</label>
							<input type="time" id="time" name="time" required value="{{reminder.time}}"><br>
						</div>
						<label for="notes">Notes</label>
						<textarea id="note" name="notes" rows="4" placeholder="Optional details..." value="{{reminder.notes}}"></textarea><br>
						<button type="submit" class="admin-bth primary">Save Reminder</button>
					</form>
        </div>
    </div>
	</body>
</head>

{% endblock %}
