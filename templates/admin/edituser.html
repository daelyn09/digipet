{% extends "base.html" %}
{% block title %} 
Edit User
{% endblock %}
{% block body %}
<head>
	<body style="background: #f5f5f5;">
        <a href="/admin" class="adminbutton">&#8592; Back to Dashboard</a>
<div class="contactcontainer">
    <div class="contactbox">
        <h1>Edit User</h1>
        <form method="POST" action="{{url_for('edituser',id=user.id)}}">
            <div class="contactname">
                <div class="name">
                    <label for="firstname">First Name:</label>
                    <input type="text" id="firstname" name="first_name" value="{{user.first_name}}"required>
                </div>
                <div class="name">
                    <label for="lastname">Last Name:</label>
                    <input type="text" id="lastname" name="last_name" value="{{user.last_name}}" required>
                </div>
            </div>
             <label>Username:</label>
    <input type="text" name="username" value="{{user.username}}" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{user.email}}" required>
            <button type="submit" class="button large "> Save User</button>
        </form>
    </div>
</div>
</body>
</head>
{% endblock %}
